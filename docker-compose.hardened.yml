services:
  bridge:
    build:
      context: ./bridge
    container_name: kogwistar-openclaw-bridge
    ports:
      - "8788:8788"
    env_file:
      - .env
    restart: unless-stopped

  openclaw:
    build:
      context: ./openclaw-container
      dockerfile: Dockerfile
    container_name: kogwistar-openclaw
    depends_on:
      - bridge
    ports:
      - "18789:18789"
    environment:
      NODE_ENV: production
    read_only: true
    tmpfs:
      - /tmp
      - /home/claw/.openclaw/tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

